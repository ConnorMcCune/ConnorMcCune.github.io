<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Food Pyramid</title>
  <link rel="stylesheet" href="styles.css">
  <script src="scripts.js"></script>
  <style>
    table {
    border-collapse: collapse;
    border: 2px solid black;
    margin-left: auto;
    margin-right: auto;
    }

    th, td {
    border: 1px solid black;
    padding: 8px;
    }
    .green-back{
      background-color: #228B22;
    }
  </style>
</head>
<body>
  <header>
    
  </header>
  <nav>
    
  </nav>
  <main>
    <table>
      <caption>USDA Food Pyramid</caption>
      <thead>
        <tr class="green-back">
          <th> </th>
          <th colspan="2">Serving Guidelines</th>
        </tr>
      </thead>
      <tbody>
        <tr class="green-back">
          <td>Food Groups</td>
          <td>2005-2010</td>
          <td>2011-present</td>
        </tr>
        <tr>
          <td>Dairy</td>
          <td>2-3</td>
          <td>3-4</td>
        </tr>
        <tr>
          <td>Meat and Beans</td>
          <td>2-3</td>
          <td>5-6</td>
        </tr>
        <tr>
          <td>Fruits</td>
          <td>2-4</td>
          <td>2-4</td>
        </tr>
        <tr>
          <td>Vegetables</td>
          <td>3-5</td>
          <td>1-2</td>
        </tr>
        <tr>
          <td>Grains</td>
          <td>1-2</td>
          <td>3-5</td>
        </tr>
      </tbody>
    </table>
  </main>
  <footer>
    
  </footer>
</body>
</html>
