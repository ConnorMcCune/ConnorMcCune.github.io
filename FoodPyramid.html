<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Food Pyramid</title>
  <link rel="stylesheet" href="styles.css">
  <script src="scripts.js"></script>
  <style>
    table {
    border-collapse: collapse;
    border: 2px solid black;
    margin-left: auto;
    margin-right: auto;
    }

    th, td {
    border: 1px solid black;
    padding: 8px;
    }
    .green-back{
      background-color: #228B22;
      color: #ffffff;
    }
    .make-middle{
      text-align: center;
    }
    .highlight{
      font-weight: bold;
    }
    .italic-text {
    font-style: italic;
    }

    tbody th {text-decoration:none;
  </style>
</head>
<body>
  <header>
    
  </header>
  <nav>
    
  </nav>
  <main>
    <table>
      <caption style="padding :10px;"><h2>USDA Food Pyramid</h2></caption>
      <thead class="green-back">
        <tr>
          <th> </th>
          <th colspan="2">Serving Guidelines</th>
        </tr>
        <tr>
          <th class="highlight">Food Groups</th>
          <th class="make-middle">2005-2010</th>
          <th class="make-middle">2011-present</th>
        </tr>
      </thead>
      <tbody>
        
        <tr>
          <th>
            <div class="highlight">Dairy</div>
            <div class="italic-text">(milk, yogurt, cheese)</div>
          </th>
          <td class="make-middle">2-3</td>
          <td class="make-middle">3-4</td>
        </tr>
        <tr>
          <th>
            <div class="highlight">Meat and Beans</div>
            <div class="italic-text">(beef, poultry, fish, beans)</div>
          </th>
          <td class="make-middle">2-3</td>
          <td class="make-middle">5-6</td>
        </tr>
        <tr>
          <th class="highlight">
            Fruits
          </th>
          <td class="make-middle">2-4</td>
          <td class="make-middle">2-4</td>
        </tr>
        <tr>
          <th class="highlight">Vegetables</th>
          <td class="make-middle">3-5</td>
          <td class="make-middle">1-2</td>
        </tr>
        <tr>
          <th>
            <div class="highlight">Grains</div>
            <div class="italic-text">(bread, donuts, poptarts)</div>
          </th>
          <td class="make-middle">1-2</td>
          <td class="make-middle">3-5</td>
        </tr>
      </tbody>
    </table>
  </main>
  <footer>
    
  </footer>
</body>
</html>
